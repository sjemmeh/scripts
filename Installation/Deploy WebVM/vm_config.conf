APP="Web-App-Deployer" # Application name

# VM configuration for Web Application Deployment
TEMPLATE="debian-13-standard_13.1-2_amd64.tar.zst" # VM template to use
STORAGE="local" # Storage location for the VM
var_cpu="2" # Number of CPU cores
var_ram="2048" # RAM in MB
var_disk="10" # Disk size in GB
var_tag="webhost" # Tag to identify the VM

# Network configuration
IP_BASE="192.168.1." # Base IP for VMs (last octet will be assigned dynamically)
GW="192.168.1.1" # Gateway IP
DNS="192.168.1.1" # DNS server IP
BRIDGE="vmbr1" # Network bridge

# Database configuration
DB_HOST="" # Database host (postgresql server)
DB_USER="" # Database user
DB_PASS="" # Database password

# Docker registry credentials
DOCKER_USERNAME="" # Docker registry username
DOCKER_PASSWORD="" # Docker registry password
DOCKER_IMAGE="myrepo/webapp:latest" # Docker image to deploy